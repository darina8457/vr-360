<!DOCTYPE html>
<html lang="bg">

<head>
  <meta charset="UTF-8">
  <title>VR Турове </title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="assets/images/favicon.jpg">
</head>

<body>

  <div class="navbar">
    <a href="index.html" class="nav-left">
      <img src="assets/images/logo.png" class="nav-logo">
      <span class="nav-title">Перник – туристически гид</span>
    </a>
    <div class="nav-links">
      <a href="index.html">Начало</a>
      <a href="landmarks.html">Забележителности</a>
      <a href="pernik.html">Любопитни факти</a>
      <a href="transport.html">Транспорт</a>
      <a href="food.html">Места за хранене</a>
      <a href="contact.html">Контакти</a>
      <a href="vr-tour.html" class="nav-vr active">
        <i class="fa-solid fa-vr-cardboard"></i>
      </a>
    </div>
  </div>

  <h1 class="vr-page-title">VR Турове</h1>

  <!-- Grid с миниатюри -->
  <div class="vr-grid">
    <div class="vr-item" data-pano="ivan-rilski.jpg">
      <h2>Църква Св.Иван Рилски</h2>
      <div class="vr-container">
        <img src="assets/panoramas/ivan-rilski.jpg" alt="Църква Св.Иван Рилски">
      </div>
    </div>

    <div class="vr-item" data-pano="minen-muzei.jpg">
      <h2>Минен и Исторически музеи</h2>
      <div class="vr-container">
        <img src="assets/panoramas/minen-muzei.jpg" alt="Минен музей">
      </div>
    </div>

    <div class="vr-item" data-pano="krakra1.jpg">
      <h2>Крепост Кракра</h2>
      <div class="vr-container">
        <img src="assets/panoramas/krakra1.jpg" alt="Крепост Кракра">
      </div>
    </div>

    <div class="vr-item" data-pano="minna-direkcia.jpg">
      <h2>Минна дирекция</h2>
      <div class="vr-container">
        <img src="assets/panoramas/minna-direkcia.jpg" alt="Минна дирекция">
      </div>
    </div>

    <div class="vr-item" data-pano="palace.jpg">
      <h2>Дворец на културата</h2>
      <div class="vr-container">
        <img src="assets/panoramas/palace.jpg" alt="Дворец на културата">
      </div>
    </div>

    <div class="vr-item" data-pano="park.jpg">
      <h2>Градски парк</h2>
      <div class="vr-container">
        <img src="assets/panoramas/park.jpg" alt="Градски парк">
      </div>
    </div>
  </div>

  <!-- Overlay за VR панорамата -->
  <div id="vrOverlay"
    style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:black; z-index:1000;">
    <button id="closeVR" style="position:absolute; top:10px; right:10px; font-size:2rem; z-index:1010;">✖</button>
    <a-scene id="scene" embedded renderer="colorManagement: true;" vr-mode-ui="enabled: false"
      style="width:100%; height:100%;">
      <a-assets>
        <img id="pano-ivan-rilski" src="assets/panoramas/ivan-rilski.jpg" crossorigin="anonymous">
        <img id="pano-minen-muzei" src="assets/panoramas/minen-muzei.jpg" crossorigin="anonymous">
        <img id="pano-krakra1" src="assets/panoramas/krakra1.jpg" crossorigin="anonymous">
        <img id="pano-minna-direkcia" src="assets/panoramas/minna-direkcia.jpg" crossorigin="anonymous">
        <img id="pano-palace" src="assets/panoramas/palace.jpg" crossorigin="anonymous">
        <img id="pano-park" src="assets/panoramas/park.jpg" crossorigin="anonymous">
      </a-assets>
      <a-sky id="sky" src="#pano-ivan-rilski"></a-sky>
      <a-entity camera look-controls="reverseMouseDrag: true"></a-entity>
    </a-scene>
  </div>

  <script src="js/vr.js"></script>

  <p class="site-footer">
    © 2025 PerNik360 • Образователен проект
  </p>

</body>

</html>
